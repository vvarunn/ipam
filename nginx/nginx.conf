events {
    worker_connections 1024;
}

http {
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Docker DNS resolver - prevents IP caching issues when containers restart
    # Docker's internal DNS server is always at 127.0.0.11
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # HTTP server - redirect to HTTPS
    server {
        listen 0.0.0.0:80 default_server;
        listen [::]:80 default_server;
        server_name localhost 192.168.0.174 iphub.ipmatrix.local _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 0.0.0.0:443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name iphub.ipmatrix.local _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Client max body size (for file uploads)
        client_max_body_size 100M;

        # Proxy settings with dynamic DNS resolution
        # Using a variable forces nginx to re-resolve the hostname on each request
        set $backend_app "app:8000";
        
        location / {
            proxy_pass http://$backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support (if needed in future)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static files - explicitly forward the path when using variable in proxy_pass
        location /static/ {
            rewrite ^/static/(.*)$ /static/$1 break;
            proxy_pass http://$backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
		server {
		listen 443 ssl;
		server_name stackvalue.ipmatrix.local;

    # --- TLS Hardening ---
		ssl_certificate /etc/nginx/certs/cert.pem;
		ssl_certificate_key /etc/nginx/certs/key.pem;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
		ssl_prefer_server_ciphers on;
		ssl_session_cache shared:SSL:10m;
		ssl_session_timeout 10m;

		# --- Security Headers ---
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-XSS-Protection "1; mode=block" always;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
		    # Hide nginx version
    server_tokens off;

    # --- Request Limits ---
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Login Rate Limiting ---
    location /login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- General Proxy ---
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # --- Static Files (cache-friendly) ---
    location /static/ {
        proxy_pass http://web:5000/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
	}
    }   # end server: stackvalue.ipmatrix.local
}       # end http