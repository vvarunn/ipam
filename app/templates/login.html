<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPAM - Login</title>
  <link rel="icon" type="image/png" href="/static/images/favicon.png">
  <link rel="stylesheet" href="/static/css/modern.css">
  <script src="/static/js/dark-mode.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,
          #404040 0%,
          #525252 25%,
          #3b3b3b 50%,
          #404040 75%,
          #4a4a4a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      position: relative;
      overflow: hidden;
    }

    [data-theme="dark"] body {
      background: linear-gradient(135deg,
          #262626 0%,
          #404040 25%,
          #262626 50%,
          #404040 75%,
          #525252 100%);
      background-size: 400% 400%;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* Animated background shapes */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 20s ease-in-out infinite;
    }

    .bg-shape:nth-child(1) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
      top: 10%;
      left: 15%;
      animation-delay: 0s;
    }

    .bg-shape:nth-child(2) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
      bottom: 10%;
      right: 10%;
      animation-delay: -5s;
    }

    .bg-shape:nth-child(3) {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 70%;
      animation-delay: -10s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(30px, -30px) rotate(120deg);
      }

      66% {
        transform: translate(-20px, 20px) rotate(240deg);
      }
    }

    .login-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: var(--space-10);
      border-radius: var(--radius-2xl);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 450px;
      width: 100%;
      margin: var(--space-4);
      position: relative;
      z-index: 10;
      animation: slideInDown 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-logo {
      font-size: 64px;
      margin-bottom: var(--space-4);
      animation: pulse 2s ease-in-out infinite;
    }

    .login-header h2 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
      -webkit-text-fill-color: initial;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .auth-section {
      margin-bottom: var(--space-6);
    }

    .auth-section h3 {
      font-size: 14px;
      margin-bottom: var(--space-4);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-sizing: border-box;
      font-size: 14px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: all var(--transition-base);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gray-400);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      transform: translateY(-1px);
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: var(--space-4);
      background: var(--gray-900);
      color: white;
      text-decoration: none;
      border-radius: var(--radius-lg);
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 15px;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-login:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-xl);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-sso {
      background: var(--gray-700);
    }

    .divider {
      text-align: center;
      margin: var(--space-6) 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: var(--border-medium);
    }

    .divider span {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 0 var(--space-4);
      position: relative;
      color: var(--text-tertiary);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .error {
      background: var(--danger-light);
      color: var(--danger-dark);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-top: var(--space-3);
      display: none;
      border: 1px solid var(--danger);
      animation: shake 0.3s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-10px);
      }

      75% {
        transform: translateX(10px);
      }
    }

    .theme-toggle-login {
      position: fixed;
      top: var(--space-6);
      right: var(--space-6);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: var(--space-3);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 24px;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-lg);
      z-index: 100;
    }

    .theme-toggle-login:hover {
      transform: rotate(180deg) scale(1.1);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: var(--space-6);
      }

      .login-header h2 {
        font-size: 24px;
      }

      .login-logo {
        font-size: 48px;
      }
    }
  </style>
</head>

<body>
  <!-- Background shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <!-- Theme Toggle -->
  <button id="themeToggle" class="theme-toggle-login" onclick="toggleTheme()" aria-label="Toggle theme">
    🌙
  </button>

  <!-- Login Container -->
  <div class="login-container" style="padding: var(--space-6); max-width: 400px;">
    <div class="login-header" style="margin-bottom: var(--space-4);">
      <div class="login-logo" style="margin-bottom: var(--space-2);"><img src="/static/images/logo.png" alt="IPAM Logo"
          style="height: 64px; width: 64px;"></div>
      <h2 style="font-size: 28px;">IPAM</h2>
      <p class="subtitle">Sign in to manage IP addresses</p>
    </div>

    <div class="auth-section" style="margin-bottom: var(--space-4);">
      <h3>Local Login</h3>
      <form id="localLoginForm" onsubmit="handleLocalLogin(event)">
        <div class="form-group" style="margin-bottom: var(--space-3);">
          <label for="username">Username</label>
          <input type="text" class="form-input" id="username" name="username" required autocomplete="username"
            placeholder="Enter your username">
        </div>
        <div class="form-group" style="margin-bottom: var(--space-4);">
          <label for="password">Password</label>
          <input type="password" class="form-input" id="password" name="password" required
            autocomplete="current-password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-login">Sign In</button>
        <div class="error" id="error"></div>
      </form>
    </div>

    <div class="divider" style="margin: var(--space-4) 0;">
      <span>or</span>
    </div>

    <div class="auth-section" style="margin-bottom: 0;">
      <h3>Enterprise SSO</h3>
      <a class="btn-login btn-sso" href="/auth/login">Sign in with SSO</a>
    </div>
  </div>

  <script>
    async function handleLocalLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const submitBtn = event.target.querySelector('button[type="submit"]');

      errorDiv.style.display = 'none';
      submitBtn.textContent = 'Signing in...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/auth/local/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password })
        });

        if (response.ok) {
          submitBtn.textContent = '✓ Success!';
          setTimeout(() => {
            window.location.href = '/';
          }, 500);
        } else {
          const data = await response.json();
          errorDiv.textContent = data.detail || 'Invalid credentials';
          errorDiv.style.display = 'block';
          submitBtn.textContent = 'Sign In';
          submitBtn.disabled = false;
        }
      } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'Sign In';
        submitBtn.disabled = false;
      }
    }
  </script>
</body>

</html>
